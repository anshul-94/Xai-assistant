name: Keep Render Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Chat Endpoint
        run: |
          curl -X POST https://xai-assistant-1.onrender.com/chat \
          -H "Content-Type: application/json" \
          -d '{"message":"ping"}' \
          --silent --output /dev/null
